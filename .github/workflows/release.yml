name: Release Engine

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement sur les tags de version (ex: v1.0.0)

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: m-core-engine
            asset_name: m-core-engine-linux-amd64
          - os: windows-latest
            artifact_name: m-core-engine.exe
            asset_name: m-core-engine-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release --locked

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Obligatoire pour créer une release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/m-core-engine-linux-amd64/m-core-engine
            artifacts/m-core-engine-windows-amd64.exe/m-core-engine-windows-amd64.exe
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true # Génère automatiquement le journal des modifications
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}